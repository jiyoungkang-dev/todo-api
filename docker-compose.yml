services:
  # MySQL 8 데이터베이스
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    # DB가 실제 접속 가능한 상태인지 확인 (app 의 depends_on 조건)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Spring Boot 애플리케이션
  app:
    build: .
    environment:
      # localhost 가 아니라 db 서비스명으로 접속
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        # db healthcheck 통과 후 app 기동
        condition: service_healthy

# MySQL 데이터 영속화용 named volume
volumes:
  mysql-data:
