services:
  # MySQL 8 데이터베이스
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # app 은 root 로 접속하므로 별도 유저 생성 없이 root 비밀번호만 설정
      # (root 사용 시 DB_PASSWORD 와 MYSQL_ROOT_PASSWORD 를 동일하게 맞출 것)
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    # 호스트 3306 충돌 방지: 호스트는 3307, 컨테이너 내부는 3306 유지
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    # DB가 실제 접속 가능한 상태인지 확인 (app 의 depends_on 조건)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Spring Boot 애플리케이션
  app:
    build: .
    environment:
      # localhost 가 아니라 db 서비스명으로 접속
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        # db healthcheck 통과 후 app 기동
        condition: service_healthy

# MySQL 데이터 영속화용 named volume
volumes:
  mysql-data:
